name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: waypoint
          POSTGRES_PASSWORD: waypoint
          POSTGRES_DB: waypoint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U waypoint"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://waypoint:waypoint@localhost:5432/waypoint
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @waypoint/api run db:generate

      - name: Apply database migrations
        run: pnpm --filter @waypoint/api exec prisma migrate deploy

      - name: Seed reference content
        run: pnpm --filter @waypoint/api run db:seed
        # The e2e suites (review/roadmap fixtures) create rows that foreign-key
        # into seeded content (tracks, topics), not just the migrated schema.

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
